services:
  backend:
    build:
      context: ./backend
    container_name: orders-products-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - CLIENT_URL=http://localhost:5173

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:4000/api
        - VITE_SOCKET_URL=http://localhost:4000
    container_name: orders-products-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
